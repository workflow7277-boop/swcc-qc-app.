name: Build Flet APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Flet
        run: |
          pip install flet

      - name: Build APK
        run: |
          flet build apk --project "SWCC QC"

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: swcc-app-release
          path: build/apk/*.apk
